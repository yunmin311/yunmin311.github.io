# GitHub Pages 部署(实现计划·阶段 4)
# ⚠️ 暂只允许手动触发:用户明确暂不上线,推送只作云端备份。
# 上线日(T18/T19)把 push 触发加回来:
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:
name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install, build, and upload site
        uses: withastro/action@v6

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
